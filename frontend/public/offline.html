<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Offline - Abbaa Carraa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .offline-container {
      max-width: 400px;
      width: 100%;
      background: white;
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
    }
    .offline-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 12px;
    }
    p {
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      background: #10b981;
      color: white;
      padding: 12px 28px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    .btn:hover {
      background: #059669;
    }
    .links {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
    }
    .links a {
      display: block;
      color: #10b981;
      text-decoration: none;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .links a:hover {
      text-decoration: underline;
    }
    .charity {
      margin-top: 24px;
      padding-top: 16px;
      font-size: 11px;
      color: #9ca3af;
      border-top: 1px solid #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      }
      .offline-container {
        background: #1f2937;
      }
      h1 {
        color: #f3f4f6;
      }
      p {
        color: #9ca3af;
      }
      .links {
        border-top-color: #374151;
      }
      .charity {
        border-top-color: #374151;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're offline</h1>
    <p>Please check your internet connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    
    <div class="links">
      <a href="/">🏠 Return to Homepage</a>
      <a href="/merkato-vip">🏪 Merkato VIP</a>
      <a href="/listings">🎁 Browse Prize Pools</a>
      <a href="/cities">🏙️ City VIP Programs</a>
    </div>
    
    <div class="charity">
      💚 2% supports kidney & heart disease patients<br>
      📞 Need help? Call: 0930330323 / 0913277922
    </div>
  </div>
  
  <script>
    // Check if we're online and redirect
    if (navigator.onLine) {
      window.location.href = '/';
    }
    
    // Listen for online event
    window.addEventListener('online', () => {
      window.location.href = '/';
    });
  </script>
</body>
</html>
