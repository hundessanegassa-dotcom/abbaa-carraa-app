<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Abbaa Carraa</title>
  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      text-align: center;
      padding: 50px 20px;
      background: linear-gradient(135deg, #065f46, #1e40af);
      color: white;
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container { max-width: 400px; }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    p { font-size: 1.1rem; margin-bottom: 2rem; opacity: 0.9; }
    button {
      background: white;
      color: #065f46;
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { transform: scale(1.05); }
    .emoji { font-size: 4rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">📡</div>
    <h1>You're Offline</h1>
    <p>Please check your internet connection and try again.</p>
    <button onclick="location.reload()">Try Again →</button>
    <p style="font-size: 0.8rem; margin-top: 2rem;">Abbaa Carraa will reconnect automatically.</p>
  </div>
</body>
</html>
